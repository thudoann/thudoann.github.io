<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Civique Français</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,800;0,900;1,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #fff;
      --ink:   #111;
      --dim:   #999;
      --line:  #eaeaea;
      --green: #2d7a4f;
      --red:   #b83c3c;

      --serif: 'Fraunces', Georgia, serif;
      --sans:  'Space Grotesk', system-ui, sans-serif;
    }

    @keyframes in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html, body { background: var(--bg); }
    body {
      font-family: var(--sans);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 28px 120px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      margin-bottom: 64px;
      max-width: 480px;
      width: 100%;
      animation: in .4s ease-out;
    }
    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2.2rem, 5.5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.025em;
    }
    h1 em { font-style: italic; }

    .sound-btn { display: none; }
    .texture   { display: none; }

    .card {
      width: 100%;
      max-width: 480px;
      animation: in .4s .06s ease-out backwards;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* — START — */
    .section-label {
      font-size: .58rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
    }
    #start-screen p { display: none; }

    .option-list {
      display: flex;
      flex-direction: column;
      margin-bottom: 40px;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .88rem;
      color: var(--dim);
      text-align: left;
      transition: color .12s;
      width: 100%;
    }
    .option-list .mode-btn:last-child { border-bottom: 1px solid var(--line); }
    .mode-btn.selected { color: var(--ink); }
    .mode-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid currentColor;
      flex-shrink: 0;
      transition: background .12s;
    }
    .mode-btn.selected .dot { background: var(--ink); }
    .mode-btn strong { font-weight: 500; }
    .mode-btn .count { margin-left: auto; font-size: .72rem; color: var(--dim); }

    /* buttons — text-only */
    .btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .85rem;
      color: var(--dim);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--line);
      transition: color .12s, text-decoration-color .12s;
    }
    .btn:hover { color: var(--ink); text-decoration-color: var(--ink); }
    .btn-primary { color: var(--ink); font-weight: 600; text-decoration: none; }
    .btn-primary::after { content: " →"; font-weight: 400; }
    .btn-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

    /* — QUIZ — */
    .progress-bar { display: none; }

    .q-meta {
      display: flex;
      justify-content: space-between;
      font-size: .62rem;
      color: var(--dim);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 48px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .q-score-live { color: var(--ink); }

    .question-text {
      font-family: var(--serif);
      font-size: 1.55rem;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: -0.015em;
      margin-bottom: 40px;
      animation: in .2s ease-out;
    }

    .choices { display: flex; flex-direction: column; }

    .choice-btn {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 14px 0;
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
      cursor: pointer;
      font-size: .88rem;
      text-align: left;
      width: 100%;
      font-family: var(--sans);
      color: var(--dim);
      line-height: 1.5;
      transition: color .12s;
    }
    .choices .choice-btn:last-child { border-bottom: 1px solid var(--line); }
    .choice-btn:hover:not(:disabled) { color: var(--ink); }
    .choice-badge {
      font-family: var(--serif);
      font-style: italic;
      font-size: .8rem;
      min-width: 12px;
      flex-shrink: 0;
      opacity: .45;
    }
    .choice-btn.correct         { color: var(--green); }
    .choice-btn.correct .choice-badge { opacity: 1; }
    .choice-btn.wrong           { color: var(--red); }
    .choice-btn.wrong   .choice-badge { opacity: 1; }
    .choice-btn:disabled { cursor: default; }

    .feedback-box {
      margin-top: 32px;
      font-size: .84rem;
      line-height: 1.65;
      display: none;
      color: var(--dim);
      animation: in .2s ease-out;
    }
    .feedback-box .verdict {
      font-family: var(--serif);
      font-style: italic;
      font-size: .9rem;
      margin-bottom: 6px;
    }
    .feedback-box.correct .verdict { color: var(--green); }
    .feedback-box.wrong   .verdict { color: var(--red); }
    .feedback-en { margin-top: 10px; font-style: italic; font-size: .75rem; }
    .feedback-en::before { content: "EN — "; font-style: normal; letter-spacing: .05em; }
    .ri-en { font-style: italic; font-size: .73rem; color: var(--dim); margin-top: 3px; }
    .ri-en::before { content: "EN — "; font-style: normal; letter-spacing: .05em; }

    .next-row { display: none; margin-top: 32px; }

    /* — RESULT — */
    .result-circle {
      margin-bottom: 48px;
      animation: in .4s ease-out;
    }
    .result-circle .big {
      font-family: var(--serif);
      font-size: 7rem;
      font-weight: 400;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .result-circle .small {
      font-size: .58rem;
      color: var(--dim);
      letter-spacing: .22em;
      text-transform: uppercase;
      display: block;
      margin-top: 8px;
    }
    .result-mention {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-style: italic;
      margin-bottom: 4px;
    }
    .result-sub { color: var(--dim); font-size: .8rem; margin-bottom: 40px; }

    .review-list { margin-bottom: 40px; }
    .review-item { padding: 14px 0; border-top: 1px solid var(--line); font-size: .83rem; }
    .review-list .review-item:last-child { border-bottom: 1px solid var(--line); }
    .review-item .ri-q { font-weight: 500; margin-bottom: 3px; }
    .review-item .ri-a { color: var(--dim); font-size: .78rem; }
    .review-item.ok  .ri-a::before { content: "✓ "; color: var(--green); }
    .review-item.bad .ri-a::before { content: "✗ "; color: var(--red); }

    .result-actions { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

    /* — SCORES — */
    #scores-screen h2 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    #scores-screen .sub { color: var(--dim); font-size: .78rem; margin-bottom: 40px; }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin-bottom: 40px;
      border-top: 1px solid var(--line);
    }
    .stat-box { padding: 20px 0; border-right: 1px solid var(--line); }
    .stat-box:last-child { border-right: none; }
    .stat-box .sv { font-family: var(--serif); font-size: 2rem; font-weight: 400; line-height: 1; }
    .stat-box .sl { font-size: .56rem; color: var(--dim); margin-top: 6px; letter-spacing: .14em; text-transform: uppercase; }

    .scores-table-wrap { overflow-x: auto; margin-bottom: 32px; }
    .scores-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .scores-table th {
      text-align: left; padding: 8px 0;
      border-bottom: 1px solid var(--ink);
      color: var(--dim); font-weight: 400;
      font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
    }
    .scores-table td { padding: 11px 0; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .scores-table tr:last-child td { border-bottom: none; }
    .scores-table .rank { color: var(--dim); width: 20px; font-family: var(--serif); font-style: italic; }
    .scores-table .best-row .rank { color: var(--ink); }

    .pct-bar-wrap { width: 32px; background: var(--line); height: 1px; display: inline-block; vertical-align: middle; margin-right: 6px; }
    .pct-bar { height: 100%; background: var(--ink); }

    .badge-mention { font-family: var(--serif); font-style: italic; font-size: .8rem; color: var(--dim); }
    .badge-excellent { color: var(--green); }
    .badge-bien      { color: var(--ink); }
    .badge-courage   { color: var(--red); }

    .scores-empty { padding: 64px 0; color: var(--dim); font-style: italic; font-family: var(--serif); }

    .scores-actions { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .btn-danger { color: var(--red) !important; }
    .btn-danger:hover { text-decoration-color: var(--red) !important; }

    details > summary { cursor: pointer; color: var(--dim); font-size: .78rem; font-style: italic; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* progress dots */
    .progress-track { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 36px; min-height: 8px; }
    .pt-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background .2s; }
    .pt-dot.ok  { background: var(--green); }
    .pt-dot.bad { background: var(--red); }
    .pt-dot.cur { background: var(--ink); }

    /* timer */
    #timer { font-variant-numeric: tabular-nums; letter-spacing: .04em; }
    #timer.urgent { color: var(--red); }

    /* keyboard hint */
    .kbd-hint { font-size: .6rem; color: var(--dim); letter-spacing: .04em; margin-bottom: 24px; display: none; }
    .kbd-hint.visible { display: block; }
    kbd { font-family: var(--sans); background: var(--line); border-radius: 2px; padding: 1px 4px; font-size: .58rem; }

    /* exam verdict */
    #res-mention.pass { color: var(--green); }
    #res-mention.fail { color: var(--red); }
  </style>
</head>
<body>

<header>
  <h1><em>Citoyen</em> français</h1>
  <button class="sound-btn" id="sound-toggle" onclick="toggleSound()"></button>
</header>

<div class="card">

  <!-- ── START ── -->
  <div id="start-screen" class="screen active">
    <p></p>
    <div class="section-label">Examen</div>
    <div class="option-list">
      <button class="mode-btn selected" data-cat="civique" onclick="selectCategory(this)">
        <span class="dot"></span>
        <strong>Examen civique</strong>
        <span class="count" id="cat-civique-count"></span>
      </button>
      <button class="mode-btn" data-cat="code" onclick="selectCategory(this)">
        <span class="dot"></span>
        <strong>Code de la route</strong>
        <span class="count" id="cat-code-count"></span>
      </button>
    </div>

    <div class="section-label">Mode</div>
    <div class="option-list">
      <button class="mode-btn selected" data-mode="10" onclick="selectMode(this)">
        <span class="dot"></span>
        <strong>Rapide</strong>
        <span class="count">10 questions</span>
      </button>
      <button class="mode-btn" data-mode="all" onclick="selectMode(this)">
        <span class="dot"></span>
        <strong>Complet</strong>
        <span class="count">Toutes les questions</span>
      </button>
      <button class="mode-btn" data-mode="exam40" onclick="selectMode(this)">
        <span class="dot"></span>
        <strong>Examen officiel</strong>
        <span class="count">40 questions · 45 min · sans feedback</span>
      </button>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startQuiz()">Commencer</button>
      <button class="btn btn-outline" onclick="showScores()">Scores</button>
    </div>

  </div>

  <!-- ── QUIZ ── -->
  <div id="quiz-screen" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="q-meta">
      <span id="q-counter"></span>
      <span id="timer" style="display:none"></span>
      <span class="q-score-live" id="q-score-live"></span>
    </div>
    <div class="progress-track" id="progress-track"></div>
    <div class="question-text" id="question-text"></div>
    <div class="kbd-hint" id="kbd-hint">Utilisez <kbd>1–4</kbd> pour répondre, <kbd>Espace</kbd> pour continuer</div>
    <div class="choices" id="choices"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="verdict" id="feedback-verdict"></div>
      <div id="feedback-exp"></div>
      <div class="feedback-en" id="feedback-exp-en"></div>
    </div>
    <div class="next-row" id="next-row">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">Suivant</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div id="result-screen" class="screen">
    <div class="result-circle">
      <span class="big" id="res-score"></span>
      <span class="small" id="res-total"></span>
    </div>
    <div class="result-mention" id="res-mention"></div>
    <div class="result-sub" id="res-sub"></div>

    <details>
      <summary>Voir le détail</summary>
      <div class="review-list" id="review-list" style="margin-top:16px"></div>
    </details>

    <div class="result-actions" style="margin-top:32px">
      <button class="btn btn-primary" onclick="startQuiz()">Rejouer</button>
      <button class="btn btn-outline" onclick="showScores()">Scores</button>
      <button class="btn btn-outline" onclick="goHome()">Accueil</button>
    </div>
  </div>

  <!-- ── SCORES ── -->
  <div id="scores-screen" class="screen">
    <h2>Scores</h2>
    <p class="sub">Historique local de vos parties</p>

    <div class="stat-row" id="stat-row"></div>

    <div class="scores-table-wrap">
      <table class="scores-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Examen</th>
            <th>Mode</th>
            <th>Score</th>
            <th>%</th>
            <th>Mention</th>
          </tr>
        </thead>
        <tbody id="scores-tbody"></tbody>
      </table>
      <div class="scores-empty" id="scores-empty" style="display:none">
        Aucune partie jouée pour l'instant.
      </div>
    </div>

    <div class="scores-actions">
      <button class="btn btn-outline" onclick="goHome()">← Accueil</button>
      <button class="btn btn-danger" onclick="clearScores()">Effacer</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    q: "Quelle est la devise de la République française ?",
    choices: ["Liberté, Égalité, Fraternité", "Paix, Justice, Liberté", "Unité, Force, Honneur", "Travail, Famille, Patrie"],
    answer: 0,
    exp: "La devise « Liberté, Égalité, Fraternité » est inscrite dans la Constitution de 1958.",
    expEn: "The motto 'Liberty, Equality, Fraternity' is enshrined in the 1958 Constitution."
  },
  {
    q: "En quelle année la Cinquième République française a-t-elle été fondée ?",
    choices: ["1945", "1958", "1968", "1789"],
    answer: 1,
    exp: "La Ve République a été instaurée en 1958 sous l'impulsion du général de Gaulle.",
    expEn: "The Fifth Republic was established in 1958 under the leadership of General de Gaulle."
  },
  {
    q: "Qui est le chef de l'État en France ?",
    choices: ["Le Premier ministre", "Le Président de l'Assemblée nationale", "Le Président de la République", "Le Président du Sénat"],
    answer: 2,
    exp: "Le Président de la République est élu au suffrage universel direct pour 5 ans.",
    expEn: "The President of the Republic is elected by direct universal suffrage for a 5-year term."
  },
  {
    q: "Combien de chambres compose le Parlement français ?",
    choices: ["Une", "Deux", "Trois", "Quatre"],
    answer: 1,
    exp: "Le Parlement est composé de l'Assemblée nationale et du Sénat.",
    expEn: "Parliament is composed of two chambers: the National Assembly and the Senate."
  },
  {
    q: "Quel article de la Déclaration de 1789 affirme que les hommes naissent libres et égaux ?",
    choices: ["Article 1", "Article 3", "Article 7", "Article 11"],
    answer: 0,
    exp: "Article 1 : « Les hommes naissent et demeurent libres et égaux en droits. »",
    expEn: "Article 1 of the 1789 Declaration of the Rights of Man: 'Men are born and remain free and equal in rights.'"
  },
  {
    q: "À quel âge peut-on voter en France ?",
    choices: ["16 ans", "17 ans", "18 ans", "21 ans"],
    answer: 2,
    exp: "Le droit de vote est accordé à tous les citoyens français âgés d'au moins 18 ans.",
    expEn: "The right to vote is granted to all French citizens aged 18 and older."
  },
  {
    q: "Quel est le rôle principal du Conseil constitutionnel ?",
    choices: ["Voter les lois", "Vérifier la conformité des lois à la Constitution", "Juger les crimes graves", "Gérer le budget de l'État"],
    answer: 1,
    exp: "Le Conseil constitutionnel veille à la constitutionnalité des lois et au bon déroulement des élections.",
    expEn: "The Constitutional Council ensures laws comply with the Constitution and oversees elections."
  },
  {
    q: "Quelle institution représente les collectivités territoriales en France ?",
    choices: ["L'Assemblée nationale", "Le Conseil économique et social", "Le Sénat", "La Cour des comptes"],
    answer: 2,
    exp: "Le Sénat est constitutionnellement le représentant des collectivités territoriales.",
    expEn: "The Senate is constitutionally the representative of France's territorial authorities (communes, departments, regions)."
  },
  {
    q: "Lequel de ces principes N'est PAS un principe fondamental de la République française ?",
    choices: ["Laïcité", "Indivisibilité", "Monarchie", "Démocratie"],
    answer: 2,
    exp: "La France est une République — la monarchie est incompatible avec ses principes fondamentaux.",
    expEn: "France is a Republic — monarchy is incompatible with its fundamental principles."
  },
  {
    q: "Que signifie le principe de laïcité en France ?",
    choices: ["L'État favorise la religion catholique", "La religion est interdite dans la vie privée", "L'État est neutre vis-à-vis de toutes les religions", "Les religions étrangères sont interdites"],
    answer: 2,
    exp: "La laïcité, inscrite dans la loi de 1905, garantit la séparation de l'Église et de l'État.",
    expEn: "Laïcité (secularism), established by the 1905 law, guarantees the separation of Church and State and State neutrality toward all religions."
  },
  {
    q: "Combien de régions métropolitaines compte la France depuis 2016 ?",
    choices: ["13", "22", "18", "26"],
    answer: 0,
    exp: "Depuis la réforme territoriale de 2016, la France métropolitaine compte 13 régions.",
    expEn: "Since the 2016 territorial reform, metropolitan France has 13 regions (down from 22)."
  },
  {
    q: "Qu'est-ce que le suffrage universel ?",
    choices: ["Seuls les propriétaires votent", "Tous les citoyens majeurs peuvent voter", "Seuls les hommes peuvent voter", "Le vote est obligatoire"],
    answer: 1,
    exp: "Le suffrage universel permet à tout citoyen majeur de participer aux élections, sans distinction de sexe, fortune ou origine.",
    expEn: "Universal suffrage allows every adult citizen to vote, regardless of sex, wealth, or origin."
  },
  {
    q: "Quelle est la durée du mandat présidentiel en France ?",
    choices: ["4 ans", "5 ans", "6 ans", "7 ans"],
    answer: 1,
    exp: "Depuis le référendum de 2000, le mandat présidentiel est de 5 ans (quinquennat).",
    expEn: "Since the 2000 referendum, the presidential term is 5 years (quinquennat), down from 7 years."
  },
  {
    q: "Quel texte est intégré dans le préambule de la Constitution de 1958 ?",
    choices: ["La Charte de l'environnement seulement", "La Déclaration des droits de l'Homme de 1789 et le préambule de 1946", "Le traité de Maastricht", "La Charte des Nations Unies"],
    answer: 1,
    exp: "Le bloc de constitutionnalité inclut la DDHC de 1789, le préambule de 1946 et la Charte de l'environnement de 2004.",
    expEn: "The 1958 Constitution's preamble refers to the 1789 Declaration of the Rights of Man and the 1946 preamble."
  },
  {
    q: "Qui nomme le Premier ministre en France ?",
    choices: ["L'Assemblée nationale", "Le Sénat", "Le Président de la République", "Le Conseil d'État"],
    answer: 2,
    exp: "Selon l'article 8 de la Constitution, le Président de la République nomme le Premier ministre.",
    expEn: "Under Article 8 of the Constitution, the President of the Republic appoints the Prime Minister."
  },

  // ── Histoire & symboles ──
  {
    q: "En quelle année la Révolution française a-t-elle débuté ?",
    choices: ["1776", "1789", "1793", "1799"],
    answer: 1,
    exp: "La Révolution française débute en 1789 avec la prise de la Bastille le 14 juillet.",
    expEn: "The French Revolution began in 1789 with the storming of the Bastille on July 14."
  },
  {
    q: "Que commémore le 14 juillet en France ?",
    choices: ["La prise du palais de Versailles", "La prise de la Bastille (1789)", "La proclamation de la République", "La fin de la Première Guerre mondiale"],
    answer: 1,
    exp: "Le 14 juillet 1789, la prise de la Bastille symbolise le début de la Révolution. C'est la fête nationale depuis 1880.",
    expEn: "July 14 commemorates the storming of the Bastille (1789), symbol of the Revolution. It has been the national holiday since 1880."
  },
  {
    q: "Quelle est la signification des couleurs du drapeau français (bleu, blanc, rouge) ?",

// ── Web Audio API: generated sounds, no files needed ──
let audioCtx = null;
let soundEnabled = localStorage.getItem(SOUND_KEY) !== "0";

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTone({ freq = 440, duration = 0.15, type = "sine", volume = 0.15, attack = 0.01, release = 0.1, when = 0 }) {
  const ctx = ensureAudio();
  if (!ctx || !soundEnabled) return;
  const t0 = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + attack);
  gain.gain.linearRampToValueAtTime(0, t0 + duration + release);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + release + 0.02);
}

    playTone({ freq: f, duration: 0.06, type: "sine", volume: 0.1, when: i * 0.15, release: 0.2 }));
  else [392, 330].forEach((f, i) =>
    playTone({ freq: f, duration: 0.25, type: "sine", volume: 0.11, when: i * 0.3, release: 0.4 }));
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem(SOUND_KEY, soundEnabled ? "1" : "0");
  updateSoundBtn();
  if (soundEnabled) sndClick();
}

function updateSoundBtn() {
  const btn = document.getElementById("sound-toggle");
  if (btn) btn.textContent = soundEnabled ? "🔊" : "🔇";
}

let mode = "10";
let category = "civique";
let queue = [];
let current = 0;
let score = 0;
let history = [];
let isExam = false;
let timerInterval = null;
let timerSeconds = 0;
let autoAdvanceTimer = null;

function currentBank() {
  return category === "code" ? DRIVING_QUESTIONS : QUESTIONS;
}

function selectCategory(el) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  category = el.dataset.cat;
  sndClick && sndClick();
}

// ── LocalStorage helpers ──
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveScore(sc, total, m) {
  const entries = loadScores();
  const modeLabel = m === "exam40" ? "Examen" : m === "all" ? "Complet" : "Rapide";
  entries.unshift({
    date: new Date().toISOString(),
    mode: modeLabel,
    category: category === "code" ? "Code" : "Civique",
    score: sc,
    total,
    pct: Math.round(sc / total * 100)
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries.slice(0, 50)));
}

function mentionOf(pct) {
  if (pct >= 80) return { label: "Excellent",  cls: "badge-excellent" };
  if (pct >= 60) return { label: "Bien",        cls: "badge-bien"      };
  return               { label: "Courage",      cls: "badge-courage"   };
}

function showScores() {
  const entries = loadScores();
  const tbody = document.getElementById("scores-tbody");
  const empty = document.getElementById("scores-empty");
  tbody.innerHTML = "";

  if (entries.length === 0) {
    empty.style.display = "block";
    document.getElementById("stat-row").innerHTML = "";
  } else {
    empty.style.display = "none";

    // Stats
    const best = Math.max(...entries.map(e => e.pct));
    const avg  = Math.round(entries.reduce((s, e) => s + e.pct, 0) / entries.length);
    document.getElementById("stat-row").innerHTML = `
      <div class="stat-box"><div class="sv">${entries.length}</div><div class="sl">Parties jouées</div></div>
      <div class="stat-box"><div class="sv">${avg}%</div><div class="sl">Moyenne</div></div>
      <div class="stat-box"><div class="sv">${best}%</div><div class="sl">Meilleur score</div></div>
    `;

    entries.forEach((e, i) => {
      const m = mentionOf(e.pct);
      const isBest = e.pct === best && i === entries.findIndex(x => x.pct === best);
      const d = new Date(e.date);
      const dateStr = d.toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit", year:"2-digit" })
                    + " " + d.toLocaleTimeString("fr-FR", { hour:"2-digit", minute:"2-digit" });
      const barColor = e.pct >= 80 ? "var(--green)" : e.pct >= 60 ? "var(--yellow)" : "var(--red)";

      const tr = document.createElement("tr");
      if (isBest) tr.classList.add("best-row");
      tr.innerHTML = `
        <td class="rank">${isBest ? "★" : i + 1}</td>
        <td>${dateStr}</td>
        <td>${e.category || "Civique"}</td>
        <td>${e.mode}</td>
        <td>${e.score}/${e.total}</td>
        <td>
          <span class="pct-bar-wrap"><span class="pct-bar" style="width:${e.pct}%;background:${barColor}"></span></span>
          ${e.pct}%
        </td>
        <td><span class="badge-mention ${m.cls}">${m.label}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  show("scores-screen");
}

function clearScores() {
  if (!confirm("Effacer tout l'historique des scores ?")) return;
  localStorage.removeItem(STORAGE_KEY);
  showScores();
}

function selectMode(el) {
  document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  mode = el.dataset.mode;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startQuiz() {
  if (timerInterval) clearInterval(timerInterval);
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);

  isExam = mode === "exam40";
  const bank = currentBank();

  if (isExam) {
    queue = shuffle(bank).slice(0, 40);
  } else {
    queue = mode === "all" ? shuffle(bank) : shuffle(bank).slice(0, 10);
  }

  current = 0; score = 0; history = [];

  const kbdHint = document.getElementById("kbd-hint");
  if (kbdHint) kbdHint.classList.add("visible");

  if (isExam) {
    timerSeconds = 45 * 60;
    const timerEl = document.getElementById("timer");
    if (timerEl) timerEl.style.display = "block";
    updateTimer();
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimer();
      if (timerSeconds <= 0) { clearInterval(timerInterval); showResult(); }
    }, 1000);
  } else {
    const timerEl = document.getElementById("timer");
    if (timerEl) timerEl.style.display = "none";
  }

  show("quiz-screen");
  renderQuestion();
}

function updateTimer() {
  const el = document.getElementById("timer");
  if (!el) return;
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  el.textContent = `${m}:${String(s).padStart(2, "0")}`;
  el.classList.toggle("urgent", timerSeconds < 300);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const el = document.getElementById("timer");
  if (el) el.style.display = "none";
}

function renderQuestion() {
  const q = queue[current];
  const total = queue.length;

  document.getElementById("progress-fill").style.width = `${(current / total) * 100}%`;
  document.getElementById("q-counter").textContent = `${current + 1} / ${total}`;
  document.getElementById("q-score-live").textContent = isExam ? "" : `${score} correct`;

  const track = document.getElementById("progress-track");
  if (track) {
    track.innerHTML = "";
    history.forEach(h => {
      const d = document.createElement("span");
      d.className = "pt-dot " + (h.ok ? "ok" : "bad");
      track.appendChild(d);
    });
    const cur = document.createElement("span");
    cur.className = "pt-dot cur";
    track.appendChild(cur);
    for (let i = history.length + 1; i < total; i++) {
      const d = document.createElement("span");
      d.className = "pt-dot";
      track.appendChild(d);
    }
  }

  document.getElementById("question-text").textContent = q.q;

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="choice-badge">${LABELS[i]}</span><span>${c}</span>`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });

  const fb = document.getElementById("feedback-box");
  fb.className = "feedback-box"; fb.style.display = "none";
  document.getElementById("next-row").style.display = "none";
}

function answer(idx) {
  const q = queue[current];
  const buttons = document.querySelectorAll(".choice-btn");

  buttons.forEach(b => b.disabled = true);

  const correct = idx === q.answer;
  if (correct) score++;
  correct ? sndCorrect() : sndWrong();

  buttons[idx].classList.add(correct ? "correct" : "wrong");
  if (!correct) buttons[q.answer].classList.add("correct");

  history.push({ q: q.q, chosen: idx, correct: q.answer, ok: correct, choices: q.choices, exp: q.exp, expEn: q.expEn });

  if (isExam) {
    autoAdvanceTimer = setTimeout(() => nextQuestion(), 900);
  } else {
    const fb = document.getElementById("feedback-box");
    fb.style.display = "block";
    fb.className = "feedback-box " + (correct ? "correct" : "wrong");
    document.getElementById("feedback-verdict").textContent = correct ? "Correct" : `Incorrect — bonne réponse : ${LABELS[q.answer]}`;
    document.getElementById("feedback-exp").textContent = q.exp;
    document.getElementById("feedback-exp-en").textContent = q.expEn || "";

    const nextRow = document.getElementById("next-row");
    nextRow.style.display = "flex";
    document.getElementById("next-btn").textContent = current + 1 < queue.length ? "Suivant" : "Résultats";
  }
}

function nextQuestion() {
  current++;
  if (current < queue.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  stopTimer();
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  const total = queue.length;
  const pct = Math.round(score / total * 100);
  saveScore(score, total, mode);
  sndFinish(pct);

  document.getElementById("res-score").textContent = score;
  document.getElementById("res-total").textContent = `/ ${total}`;

  let mention, sub, color;
  if (isExam) {
    const passed = pct >= 75;
    mention = passed ? "Admis" : "Ajourné";
    sub = passed ? `${pct} % — seuil de 75 % atteint.` : `${pct} % — le seuil requis est 75 %.`;
    color = passed ? "var(--green)" : "var(--red)";
    const mentionEl = document.getElementById("res-mention");
    mentionEl.className = passed ? "result-mention pass" : "result-mention fail";
  } else {
    if (pct >= 80) {
      mention = "Excellent"; sub = "Vous êtes prêt(e) pour l'examen."; color = "var(--green)";
    } else if (pct >= 60) {
      mention = "Bien"; sub = "Continuez à réviser les points manqués."; color = "var(--ink)";
    } else {
      mention = "Courage"; sub = "Révisez et réessayez — vous progresserez !"; color = "var(--red)";
    }
    document.getElementById("res-mention").className = "result-mention";
  }
  document.getElementById("res-mention").textContent = mention;
  document.getElementById("res-sub").textContent = sub;
  document.querySelector(".result-circle .big").style.color = color;

  const list = document.getElementById("review-list");
  list.innerHTML = "";
  history.forEach((h, i) => {
    const div = document.createElement("div");
    div.className = "review-item " + (h.ok ? "ok" : "bad");
    div.innerHTML = `
      <div class="ri-q">${i + 1}. ${h.q}</div>
      <div class="ri-a">${h.ok ? "✔" : "✘"} Votre réponse : <strong>${LABELS[h.chosen]} — ${h.choices[h.chosen]}</strong>${!h.ok ? ` · Bonne réponse : <strong>${LABELS[h.correct]} — ${h.choices[h.correct]}</strong>` : ""}</div>
      ${h.expEn ? `<div class="ri-en">${h.expEn}</div>` : ""}
    `;
    list.appendChild(div);
  });

  show("result-screen");
}

function goHome() {
  stopTimer();
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  show("start-screen");
}

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  const quizActive = document.getElementById("quiz-screen").classList.contains("active");
  if (!quizActive) return;

  const buttons = document.querySelectorAll(".choice-btn");
  if (!buttons.length) return;

  const answered = buttons[0].disabled;

  if (!answered) {
    const map = { "1": 0, "2": 1, "3": 2, "4": 3 };
    if (e.key in map) {
      const idx = map[e.key];
      if (idx < buttons.length) answer(idx);
    }
  } else {
    if ((e.key === " " || e.key === "ArrowRight" || e.key === "Enter") && !isExam) {
      e.preventDefault();
      const nextRow = document.getElementById("next-row");
      if (nextRow && nextRow.style.display !== "none") nextQuestion();
    }
  }
});

// Initialize on load
updateSoundBtn();
(function initCounts() {
  const a = document.getElementById("cat-civique-count");
  const b = document.getElementById("cat-code-count");
  if (a) a.textContent = QUESTIONS.length + " questions";
  if (b) b.textContent = DRIVING_QUESTIONS.length + " questions";
})();
</script>
