<div class="sudoku-wrap">
  <div class="sudoku-header">
    <span class="sudoku-timer mono muted" data-role="sudoku-timer" aria-label="Chronomètre">00:00</span>
    <div class="sudoku-top-controls">
      <select class="sudoku-difficulty" data-role="sudoku-difficulty" aria-label="Difficulté">
        <option value="easy">Facile</option>
        <option value="medium" selected>Moyen</option>
        <option value="hard">Difficile</option>
      </select>
      <button type="button" class="sudoku-new-btn" data-role="sudoku-new">Nouvelle partie</button>
    </div>
  </div>

  <div class="sudoku-board" data-role="sudoku-board" role="grid" aria-label="Grille de Sudoku"></div>

  <div class="sudoku-numpad" data-role="sudoku-numpad" aria-label="Pavé numérique"></div>

  <div class="sudoku-actions">
    <button type="button" class="sudoku-action-btn" data-role="sudoku-notes" aria-pressed="false">✏ Notes</button>
    <button type="button" class="sudoku-action-btn" data-role="sudoku-undo">↩ Annuler</button>
    <button type="button" class="sudoku-action-btn" data-role="sudoku-check">✓ Vérifier</button>
    <button type="button" class="sudoku-action-btn sudoku-reveal-btn" data-role="sudoku-reveal">Solution</button>
  </div>

  <p class="sudoku-message muted" data-role="sudoku-message" aria-live="polite"></p>
</div>
